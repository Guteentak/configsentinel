name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Run ConfigSentinel strict clean scan
        run: configsentinel scan tests/fixtures/valid

      - name: Run ConfigSentinel non-blocking repository smoke scan
        run: |
          set +e
          configsentinel scan .
          status=$?
          set -e
          if [ "$status" -gt 1 ]; then
            exit "$status"
          fi
